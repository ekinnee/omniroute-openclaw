name: Publish to ClawHub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: pnpm pack
      - uses: actions/upload-artifact@v4
        with:
          name: clawpack
          path: ./*.tgz
          if-no-files-found: error

  publish_release:
    if: github.event_name == 'release'
    needs: build
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.23.1
    with:
      source: ekinnee/omniroute-openclaw
      dry_run: false
      package_artifact_name: clawpack
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}

  publish_dispatch:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.23.1
    with:
      source: ekinnee/omniroute-openclaw
      dry_run: ${{ inputs.dry_run }}
      package_artifact_name: clawpack
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
