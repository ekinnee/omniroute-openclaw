name: Publish to ClawHub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only
        type: boolean
        default: true

jobs:
  publish_release:
    if: github.event_name == 'release'
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      source: ekinnee/omniroute-openclaw
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}

  publish_dispatch:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      source: ekinnee/omniroute-openclaw
      dry_run: ${{ inputs.dry_run }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
